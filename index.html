<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تقطيع الفواكه - Fruit Slash</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
        body{background:#1a0a00;overflow:hidden;touch-action:manipulation;position:fixed;top:0;left:0;width:100vw;height:100dvh;font-family:Arial,sans-serif}
        canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
        #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
        #scorePanel{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);padding:10px 25px;border-radius:25px;border:2px solid #ffaa00;text-align:center}
        #scoreText{color:#ffd700;font-size:2.5em;font-weight:bold;text-shadow:0 0 15px rgba(255,215,0,0.6)}
        #bestText{color:#ff9800;font-size:0.8em}
        #livesPanel{position:absolute;top:50px;right:20px;display:flex;gap:8px}
        #comboText{position:absolute;top:120px;left:50%;transform:translateX(-50%);color:#ff4444;font-size:1.5em;font-weight:bold;opacity:0;transition:all 0.2s;text-shadow:0 0 20px rgba(255,68,68,0.8)}
        #gameOverPanel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);padding:25px 35px;border-radius:20px;border:3px solid #ff4444;text-align:center;display:none}
        #gameOverPanel h2{color:#ff4444;font-size:2em;margin-bottom:10px}
        #gameOverPanel p{color:#fff;font-size:1.2em;margin:5px 0}
        #gameOverPanel button{margin-top:15px;padding:12px 30px;background:#ff9800;color:#fff;border:none;border-radius:25px;font-size:1.1em;font-weight:bold;cursor:pointer;pointer-events:auto}
        #startMsg{position:absolute;top:60%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:1.2em;text-align:center;text-shadow:0 0 15px rgba(255,255,255,0.7);animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <div id="scorePanel"><div id="scoreText">0</div><div id="bestText">🏆 أفضل: 0</div></div>
        <div id="livesPanel"></div>
        <div id="comboText"></div>
        <div id="gameOverPanel"><h2>💀 خسرت!</h2><p>نتيجتك: <span id="fs">0</span></p><p>🏆 أفضل: <span id="fb">0</span></p><button id="rb">🔄 العب تاني</button></div>
        <div id="startMsg">👆 المس واسحب لتقطيع الفواكه</div>
    </div>
    <script>
        const c=document.getElementById('c'),ctx=c.getContext('2d');
        function R(){c.width=window.innerWidth;c.height=window.innerHeight}R();window.addEventListener('resize',R);

        // رسم قلب حقيقي
        function drawHeart(ctx,x,y,size,color){
            ctx.fillStyle=color;
            ctx.beginPath();
            ctx.moveTo(x,y+size*0.3);
            ctx.bezierCurveTo(x-size*0.5,y-size*0.3,x-size*0.5,y-size*0.8,x,y-size*0.5);
            ctx.bezierCurveTo(x+size*0.5,y-size*0.8,x+size*0.5,y-size*0.3,x,y+size*0.3);
            ctx.fill();
            ctx.fillStyle='rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(x-size*0.15,y-size*0.5,size*0.15,0,Math.PI*2);
            ctx.fill();
        }

        let fruits=[],halves=[],bombs=[],particles=[],slices=[],score=0,best=parseInt(localStorage.getItem('fb')||'0'),lives=3,combo=0,ct=0,run=!0,over=!1,st=0,diff=1,speedMultiplier=1,mx=c.width/2,my=c.height/2,pmx=mx,pmy=my,sw=!1;

        const FT=[{name:'بطيخ',r:38,p:1,draw:drawWatermelon,ic:'#ff3333',oc:'#2e7d32'},{name:'تفاح',r:30,p:1,draw:drawApple,ic:'#ffffcc',oc:'#c62828'},{name:'برتقال',r:32,p:1,draw:drawOrange,ic:'#ffcc00',oc:'#e65100'},{name:'ليمون',r:26,p:2,draw:drawLemon,ic:'#ffffcc',oc:'#fdd835'},{name:'عنب',r:24,p:2,draw:drawGrapes,ic:'#ccffcc',oc:'#6a1b9a'},{name:'كيوي',r:28,p:3,draw:drawKiwi,ic:'#aaffaa',oc:'#795548'},{name:'خوخ',r:30,p:2,draw:drawPeach,ic:'#ffcc80',oc:'#ff8a80'},{name:'فراولة',r:22,p:3,draw:drawStrawberry,ic:'#ffcccc',oc:'#c62828'}];

        function drawWatermelon(ctx,x,y,r){ctx.fillStyle='#2e7d32';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#1b5e20';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,r-3,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.arc(x-r*0.3,y-r*0.3,r*0.35,0,Math.PI*2);ctx.fill()}
        function drawApple(ctx,x,y,r){ctx.fillStyle='#c62828';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#b71c1c';ctx.beginPath();ctx.arc(x+r*0.2,y-r*0.1,r*0.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(x-r*0.25,y-r*0.3,r*0.25,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4caf50';ctx.beginPath();ctx.ellipse(x,y-r*0.85,r*0.2,r*0.4,0.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#5d4037';ctx.fillRect(x-1,y-r*1.2,3,r*0.5)}
        function drawOrange(ctx,x,y,r){ctx.fillStyle='#ff9800';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f57c00';ctx.beginPath();ctx.arc(x+r*0.15,y-r*0.1,r*0.25,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.arc(x-r*0.2,y-r*0.25,r*0.2,0,Math.PI*2);ctx.fill()}
        function drawLemon(ctx,x,y,r){ctx.fillStyle='#fdd835';ctx.beginPath();ctx.ellipse(x,y,r*0.8,r,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f9a825';ctx.beginPath();ctx.ellipse(x+r*0.1,y-r*0.05,r*0.2,r*0.3,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.ellipse(x-r*0.3,y-r*0.3,r*0.15,r*0.2,0,0,Math.PI*2);ctx.fill()}
        function drawGrapes(ctx,x,y,r){for(let i=0;i<8;i++){const gx=x+(i%3-1)*r*0.5,gy=y+Math.floor(i/3)*r*0.6-r*0.5;ctx.fillStyle='#7b1fa2';ctx.beginPath();ctx.arc(gx,gy,r*0.35,0,Math.PI*2);ctx.fill();ctx.fillStyle='#9c27b0';ctx.beginPath();ctx.arc(gx-1,gy-1,r*0.2,0,Math.PI*2);ctx.fill()}ctx.fillStyle='rgba(255,255,255,0.3)';for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(x+(i-1)*r*0.5,y-r*0.5,r*0.1,0,Math.PI*2);ctx.fill()}}
        function drawKiwi(ctx,x,y,r){ctx.fillStyle='#795548';ctx.beginPath();ctx.ellipse(x,y,r*0.85,r,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#aaffaa';ctx.beginPath();ctx.ellipse(x,y,r*0.7,r*0.85,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8bc34a';ctx.beginPath();ctx.arc(x,y,r*0.25,0,Math.PI*2);ctx.fill();for(let i=0;i<12;i++){const a=i/12*Math.PI*2;ctx.fillStyle='#7cb342';ctx.beginPath();ctx.arc(x+Math.cos(a)*r*0.4,y+Math.sin(a)*r*0.5,2,0,Math.PI*2);ctx.fill()}}
        function drawPeach(ctx,x,y,r){ctx.fillStyle='#ff8a80';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff5252';ctx.beginPath();ctx.arc(x+r*0.15,y-r*0.1,r*0.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.arc(x-r*0.2,y-r*0.25,r*0.2,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#5d4037';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x,y-r*0.9);ctx.quadraticCurveTo(x+r*0.5,y-r*1.1,x+r*0.2,y-r*1.3);ctx.stroke()}
        function drawStrawberry(ctx,x,y,r){ctx.fillStyle='#c62828';ctx.beginPath();ctx.moveTo(x,y-r);ctx.quadraticCurveTo(x+r*0.8,y-r*0.3,x+r*0.7,y+r*0.6);ctx.quadraticCurveTo(x,y+r*0.9,x-r*0.7,y+r*0.6);ctx.quadraticCurveTo(x-r*0.8,y-r*0.3,x,y-r);ctx.fill();ctx.fillStyle='#ffeb3b';for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(x+(i%4-1.5)*r*0.25,y+(Math.floor(i/4)-0.5)*r*0.3,1.5,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#4caf50';ctx.beginPath();ctx.ellipse(x,y-r*0.85,r*0.25,r*0.15,0.2,0,Math.PI*2);ctx.fill()}
        function drawFruitHalf(ctx,x,y,r,ic,oc,rot){ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.fillStyle=ic;ctx.beginPath();ctx.arc(0,0,r*0.7,0,Math.PI,!0);ctx.fill();ctx.strokeStyle=oc;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,r*0.7,0,Math.PI,!0);ctx.stroke();ctx.fillStyle=oc;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI,!0);ctx.fill();ctx.restore()}

        class H{constructor(x,y,vx,vy,r,ic,oc,type,rot){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.r=r;this.ic=ic;this.oc=oc;this.type=type;this.rot=rot;this.a=1;this.t=0;this.g=0.3}up(){this.vy+=this.g;this.x+=this.vx;this.y+=this.vy;this.t++;if(this.t>90)this.a-=0.02;if(this.a<0)this.a=0}d(ctx){if(this.a<=0)return;ctx.save();ctx.globalAlpha=this.a;drawFruitHalf(ctx,this.x,this.y,this.r,this.ic,this.oc,this.type,this.rot);ctx.restore()}}
        class F{constructor(t,speed){this.t=t;this.x=Math.random()*(c.width-100)+50;this.y=c.height+50;this.baseSpeed=speed;this.vy=-(6+speed*3);this.vx=(Math.random()-0.5)*4;this.rt=Math.random()*Math.PI*2;this.rs=(Math.random()-0.5)*0.08;this.s=!1;this.g=0.3;this.maxY=50+Math.random()*100}up(){if(!this.s){this.vy+=this.g;this.y+=this.vy;this.x+=this.vx;this.rt+=this.rs;if(this.y<this.maxY){this.vy=Math.abs(this.vy)*0.5;this.y=this.maxY}if(this.x<0)this.x=c.width;if(this.x>c.width)this.x=0}}d(ctx){if(this.s)return;ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rt);this.t.draw(ctx,0,0,this.t.r);ctx.restore()}}
        class B{constructor(speed){this.x=Math.random()*(c.width-100)+50;this.y=c.height+50;this.vy=-(6+speed*3);this.vx=(Math.random()-0.5)*4;this.ex=!1;this.g=0.3;this.maxY=50+Math.random()*100}up(){if(!this.ex){this.vy+=this.g;this.y+=this.vy;this.x+=this.vx;if(this.y<this.maxY){this.vy=Math.abs(this.vy)*0.5;this.y=this.maxY}}}d(ctx){ctx.save();ctx.translate(this.x,this.y);ctx.fillStyle='#111';ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);ctx.fill();ctx.fillStyle='#333';ctx.beginPath();ctx.arc(-5,-5,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f44336';ctx.beginPath();ctx.arc(0,-14,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.fillText('💣',0,4);ctx.restore()}}
        class P{constructor(x,y,c){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*10;this.vy=(Math.random()-0.5)*10-5;this.l=1;this.c=c;this.s=2+Math.random()*7}up(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.3;this.l-=0.03}d(ctx){ctx.fillStyle=this.c;ctx.globalAlpha=this.l;ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}}
        class S{constructor(x1,y1,x2,y2){this.x1=x1;this.y1=y1;this.x2=x2;this.y2=y2;this.l=1}up(){this.l-=0.06}d(ctx){ctx.strokeStyle=`rgba(255,255,255,${this.l})`;ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(this.x1,this.y1);ctx.lineTo(this.x2,this.y2);ctx.stroke()}}

        function sF(){speedMultiplier=1+(score/50);const speed=Math.min(speedMultiplier,4);fruits.push(new F(FT[Math.floor(Math.random()*FT.length)],speed))}
        function sB(){speedMultiplier=1+(score/50);const speed=Math.min(speedMultiplier,4);bombs.push(new B(speed))}
        function slF(f,a){const t=f.t;halves.push(new H(f.x,f.y,-4+Math.random()*3,-5+Math.random()*5,t.r,t.ic,t.oc,t.name,a-0.6),new H(f.x,f.y,4+Math.random()*3,-5+Math.random()*5,t.r,t.ic,t.oc,t.name,a+0.6))}
        function cS(x1,y1,x2,y2){for(let f of fruits){if(f.s)continue;if(dPL(f.x,f.y,x1,y1,x2,y2)<f.t.r){f.s=!0;slF(f,Math.atan2(y2-y1,x2-x1));score+=f.t.p*(1+Math.floor(combo/3));combo++;ct=60;for(let i=0;i<15;i++)particles.push(new P(f.x,f.y,f.t.ic));if(combo>=5)sc()}}for(let b of bombs){if(b.ex)continue;if(dPL(b.x,b.y,x1,y1,x2,y2)<26){b.ex=!0;lives--;combo=0;uL();for(let i=0;i<30;i++)particles.push(new P(b.x,b.y,'#ff4444'));if(lives<=0)eG()}}}
        function dPL(px,py,x1,y1,x2,y2){const A=px-x1,B=py-y1,C=x2-x1,D=y2-y1,dot=A*C+B*D,lS=C*C+D*D;let p=-1;if(lS!==0)p=dot/lS;let xx,yy;if(p<0){xx=x1;yy=y1}else if(p>1){xx=x2;yy=y2}else{xx=x1+p*C;yy=y1+p*D}return Math.sqrt((px-xx)**2+(py-yy)**2)}
        function sc(){const e=document.getElementById('comboText');e.textContent=`🔥 كومبو ×${combo}!`;e.style.opacity='1';e.style.transform='translateX(-50%) scale(1.5)';setTimeout(()=>{e.style.opacity='0';e.style.transform='translateX(-50%) scale(1)'},500)}
        function uL(){const p=document.getElementById('livesPanel');p.innerHTML='';for(let i=0;i<3;i++){const cv=document.createElement('canvas');cv.width=30;cv.height=30;const cx=cv.getContext('2d');drawHeart(cx,15,15,12,i<lives?'#ff1744':'#555');p.appendChild(cv)}}
        function eG(){run=!1;over=!0;document.getElementById('gameOverPanel').style.display='block';document.getElementById('fs').textContent=score;if(score>best){best=score;localStorage.setItem('fb',best)}document.getElementById('fb').textContent=best;document.getElementById('startMsg').style.display='none'}
        function re(){fruits=[];halves=[];bombs=[];particles=[];slices=[];score=0;lives=3;combo=0;ct=0;run=!0;over=!1;diff=1;st=0;speedMultiplier=1;document.getElementById('gameOverPanel').style.display='none';document.getElementById('scoreText').textContent='0';document.getElementById('bestText').textContent=`🏆 أفضل: ${best}`;document.getElementById('startMsg').style.display='block';uL()}
        function up(){if(!run)return;st++;if(st>Math.max(6,25-diff)){st=0;Math.random()<0.8?sF():sB();if(diff<30)diff+=0.05}if(ct>0){ct--;if(ct<=0)combo=0}for(let f of fruits)f.up();for(let h of halves)h.up();for(let b of bombs)b.up();for(let p of particles)p.up();for(let s of slices)s.up();fruits=fruits.filter(f=>f.y<c.height+150&&!f.s);halves=halves.filter(h=>h.a>0.01);bombs=bombs.filter(b=>b.y<c.height+150);particles=particles.filter(p=>p.l>0);slices=slices.filter(s=>s.l>0);document.getElementById('scoreText').textContent=score}
        function dr(){ctx.clearRect(0,0,c.width,c.height);const g=ctx.createLinearGradient(0,0,0,c.height);g.addColorStop(0,'#1a237e');g.addColorStop(0.5,'#311b92');g.addColorStop(1,'#4a148c');ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='rgba(255,255,255,0.3)';for(let i=0;i<40;i++){ctx.beginPath();ctx.arc((i*137.5+50)%c.width,(i*97.3+30)%c.height,1.5,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#5d4037';ctx.fillRect(0,c.height-15,c.width,15);ctx.fillStyle='#795548';ctx.fillRect(0,c.height-15,c.width,4);ctx.fillStyle='#3e2723';ctx.fillRect(0,c.height-3,c.width,3);for(let f of fruits)f.d(ctx);for(let h of halves)h.d(ctx);for(let b of bombs)b.d(ctx);for(let p of particles)p.d(ctx);for(let s of slices)s.d(ctx)}
        function gl(){up();dr();requestAnimationFrame(gl)}
        c.addEventListener('touchstart',e=>{e.preventDefault();if(over)return;sw=!0;const t=e.touches[0];pmx=t.clientX;pmy=t.clientY;mx=t.clientX;my=t.clientY;document.getElementById('startMsg').style.display='none'},{passive:!1});
        c.addEventListener('touchmove',e=>{e.preventDefault();if(!sw||over)return;const t=e.touches[0];pmx=mx;pmy=my;mx=t.clientX;my=t.clientY;slices.push(new S(pmx,pmy,mx,my));cS(pmx,pmy,mx,my)},{passive:!1});
        c.addEventListener('touchend',()=>{sw=!1});
        c.addEventListener('mousedown',e=>{if(over)return;sw=!0;pmx=e.clientX;pmy=e.clientY;mx=e.clientX;my=e.clientY;document.getElementById('startMsg').style.display='none'});
        c.addEventListener('mousemove',e=>{if(!sw||over)return;pmx=mx;pmy=my;mx=e.clientX;my=e.clientY;slices.push(new S(pmx,pmy,mx,my));cS(pmx,pmy,mx,my)});
        c.addEventListener('mouseup',()=>{sw=!1});
        document.getElementById('rb').addEventListener('click',re);
        document.getElementById('rb').addEventListener('touchstart',e=>{e.preventDefault();re()},{passive:!1});
        document.getElementById('bestText').textContent=`🏆 أفضل: ${best}`;uL();gl();
    </script>
</body>
</html>
